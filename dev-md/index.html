<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Documentation</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    color: #111;
}

h1 {
    margin-bottom: 30px;
}

.docs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
}

.card {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: 0.2s;
}

.card:hover {
    border-color: #000;
    transform: translateY(-2px);
}

.title {
    font-size: 18px;
    font-weight: 600;
}

.file {
    margin-top: 8px;
    color: #666;
    font-size: 14px;
}
</style>

</head>

<body>

<h1>Product Documentation</h1>

<div class="docs">

    <div class="title">Architecture</div>
    <div class="file">architecture.txt</div>

</html>
